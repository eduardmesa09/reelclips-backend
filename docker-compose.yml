services:
  app:
    build: .
    container_name: reelclips_app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: ${DB_URL?Debes definir DB_URL en .env}
      DB_USERNAME: ${DB_USERNAME?Debes definir DB_USERNAME en .env}
      DB_PASSWORD: ${DB_PASSWORD?Debes definir DB_PASSWORD en .env}
      SUPABASE_URL: ${SUPABASE_URL?Debes definir SUPABASE_URL en .env}
      SUPABASE_KEY: ${SUPABASE_KEY?Debes definir SUPABASE_KEY en .env}
      SUPABASE_BUCKET_REELS: ${SUPABASE_BUCKET_REELS?Debes definir SUPABASE_BUCKET_REELS en .env}
      SUPABASE_BUCKET_IMAGENES: ${SUPABASE_BUCKET_IMAGENES?Debes definir SUPABASE_BUCKET_IMAGENES en .env}
    ports:
      - target: 8082
        published: "${APP_PORT?APP_PORT}"
        protocol: tcp
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: reelclips_db
    environment:
      POSTGRES_DB: reelclips_db
      POSTGRES_USER: ${DB_USERNAME?Debes definir DB_USERNAME en .env}
      POSTGRES_PASSWORD: ${DB_PASSWORD?Debes definir DB_PASSWORD en .env}
    ports:
      - "5432:5432"
    volumes:
      - reelclips_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME?Debes definir DB_USERNAME en .env} -d reelclips_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  reelclips_data:
